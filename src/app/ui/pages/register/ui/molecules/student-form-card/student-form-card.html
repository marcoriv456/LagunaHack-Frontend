<hack-panel>
  <hack-labeled-text icon="person">Integrante</hack-labeled-text>
  <hack-input-label icon="person" class="name">
    <hack-text-input
      [(ngModel)]="Student.Name"
      (ngModelChange)="Change.emit()"
      Placeholder="Nombre completo"
    />
  </hack-input-label>
  <div class="row career-semester">
    <hack-select
      class="career"
      [options]="_careerOptions"
      [removeDefault]="true"
      default="null"
      [showIcons]="true"
    />

    <hack-select
      class="campus"
      [options]="_campusOptions"
      [removeDefault]="true"
      default="null"
      [showIcons]="true"
    />
  </div>
  <div class="row">
    <hack-select
      [options]="_semesterOptions"
      [removeDefault]="true"
      [default]="-1"
      [showIcons]="true"
      class="semester"
      [(ngModel)]="Student.Semester"
      (ngModelChange)="Change.emit()"
    />
    <hack-input-label icon="credential" class="control-number">
      <hack-text-input
        [(ngModel)]="Student.ControlNumber"
        (ngModelChange)="Change.emit()"
        Placeholder="N. Control"
      />
    </hack-input-label>
  </div>
  <div class="row">
    <hack-input-label icon="mail">
      <hack-text-input Placeholder="Correo institucional" />
    </hack-input-label>
  </div>
  <!-- <hack-text-input Placeholder="Carrera" /> -->
</hack-panel>
