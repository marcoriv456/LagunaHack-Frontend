<div class="wrapper" hackIntersectable TopMargin="0%">
  <hack-bold class="title">Quedan:</hack-bold>
  <div class="countdown-container">
    <div class="time-box">
      <hack-title>{{ _days }}</hack-title>
      <hack-bold>Días</hack-bold>
    </div>
    <div class="time-box">
      <hack-title>{{ _hours }}</hack-title>
      <hack-bold>Horas</hack-bold>
    </div>
    <div class="time-box">
      <hack-title>{{ _minutes }}</hack-title>
      <hack-bold>Minutos</hack-bold>
    </div>
    <div class="time-box">
      <hack-title>{{ _seconds }}</hack-title>
      <hack-bold>Segundos</hack-bold>
    </div>
  </div>
</div>
